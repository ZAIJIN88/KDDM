<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyperliquid 交易员开单弹幕面板</title>
<style>
  :root{
    --bg:#0a0e17; --panel:#121826; --panel2:#1b2436; --line:#26304a;
    --text:#e6ecf7; --muted:#8a97b2; --green:#16c784; --red:#ff5470;
    --gray:#7d8aa3; --accent:#4f8cff; --gold:#f5b945;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--text); overflow:hidden;
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",Segoe UI,Roboto,sans-serif;
  }
  /* 顶部控制栏 */
  #topbar{
    position:fixed; top:0; left:0; right:0; height:54px; z-index:30;
    display:flex; align-items:center; gap:14px; padding:0 16px;
    background:linear-gradient(180deg,rgba(18,24,38,.96),rgba(18,24,38,.82));
    border-bottom:1px solid var(--line); backdrop-filter:blur(6px);
  }
  #topbar .brand{font-weight:700; font-size:16px; letter-spacing:.5px; white-space:nowrap;}
  #topbar .brand small{color:var(--muted); font-weight:400; font-size:12px; margin-left:6px;}
  .seg{display:flex; background:var(--panel2); border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .seg button{
    background:transparent; color:var(--muted); border:0; padding:8px 14px; cursor:pointer;
    font-size:13px; font-weight:600;
  }
  .seg button.active{background:var(--accent); color:#fff;}
  .ctrl{display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted);}
  .ctrl input[type=number]{
    width:96px; background:var(--panel2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:6px 8px; font-size:13px;
  }
  .spacer{flex:1;}
  .btn{
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:8px; padding:8px 12px; cursor:pointer; font-size:13px; font-weight:600;
  }
  .btn:hover{border-color:var(--accent);}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
  #status{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); white-space:nowrap;}
  .dot{width:9px; height:9px; border-radius:50%; background:var(--gray);}
  .dot.on{background:var(--green); box-shadow:0 0 8px var(--green);}
  .dot.err{background:var(--red);}

  /* 弹幕舞台 */
  #stage{
    position:fixed; top:54px; left:0; right:0; bottom:0; overflow:hidden;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(79,140,255,.10), transparent),
      radial-gradient(900px 500px at 10% 110%, rgba(22,199,132,.08), transparent),
      var(--bg);
  }
  #hint{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    text-align:center; color:var(--muted); pointer-events:none; user-select:none;
  }
  #hint h2{font-size:20px; margin:0 0 8px; color:var(--text); font-weight:600;}
  #hint p{margin:4px 0; font-size:14px;}

  /* 弹幕卡片 */
  .danmu{
    position:absolute; left:0; will-change:transform; pointer-events:auto;
    border-radius:14px; padding:10px 12px; display:flex; flex-direction:column; gap:4px;
    background:linear-gradient(160deg,var(--panel),var(--panel2));
    border:1.5px solid var(--line); box-shadow:0 6px 22px rgba(0,0,0,.45);
    overflow:hidden; cursor:default;
  }
  .danmu.long{border-color:rgba(22,199,132,.7); box-shadow:0 0 18px rgba(22,199,132,.18),0 6px 22px rgba(0,0,0,.45);}
  .danmu.short{border-color:rgba(255,84,112,.7); box-shadow:0 0 18px rgba(255,84,112,.18),0 6px 22px rgba(0,0,0,.45);}
  .danmu.close{border-color:rgba(125,138,163,.6); opacity:.92;}
  .danmu.tweak{border-color:rgba(245,185,69,.7); box-shadow:0 0 18px rgba(245,185,69,.18),0 6px 22px rgba(0,0,0,.45);}
  .danmu .row1{display:flex; align-items:center; gap:6px;}
  .danmu .tag{
    font-weight:800; padding:1px 7px; border-radius:6px; font-size:.78em; white-space:nowrap;
  }
  .danmu.long .tag{background:rgba(22,199,132,.16); color:var(--green);}
  .danmu.short .tag{background:rgba(255,84,112,.16); color:var(--red);}
  .danmu.close .tag{background:rgba(125,138,163,.16); color:var(--gray);}
  .danmu.tweak .tag{background:rgba(245,185,69,.16); color:var(--gold);}
  .danmu .coin{font-weight:800; font-size:1.05em;}
  .danmu .lev{font-size:.8em; color:var(--gold); font-weight:700;}
  .danmu .who{font-size:.78em; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .danmu .amt{font-weight:800; letter-spacing:.3px;}
  .danmu.long .amt{color:var(--green);} .danmu.short .amt{color:var(--red);} .danmu.close .amt{color:var(--text);}

  /* 巨单（≥100万美金）特效：金色脉冲光晕 + 徽章 */
  @keyframes megaGlow{
    0%,100%{ box-shadow:0 0 16px 2px rgba(245,185,69,.5),0 0 38px rgba(245,185,69,.22),0 6px 22px rgba(0,0,0,.5); border-color:rgba(245,185,69,.9); }
    50%{ box-shadow:0 0 34px 8px rgba(255,205,60,.9),0 0 74px rgba(255,170,0,.5),0 6px 22px rgba(0,0,0,.5); border-color:#ffd24a; }
  }
  .danmu.mega{
    border-width:2px;
    background:linear-gradient(160deg,#241f0e,#33290f);
    animation:megaGlow 1.1s ease-in-out infinite;
  }
  .danmu.mega .amt{ color:var(--gold)!important; text-shadow:0 0 10px rgba(245,185,69,.6); }
  .danmu.mega .mega-badge{
    display:inline-block; font-size:.7em; font-weight:800; color:#1a1300;
    background:linear-gradient(90deg,#ffe27a,#f5b945); padding:1px 6px; border-radius:6px; margin-left:5px;
  }

  /* 地址管理抽屉 */
  #drawer{
    position:fixed; top:54px; right:0; bottom:0; width:360px; z-index:25;
    background:var(--panel); border-left:1px solid var(--line);
    transform:translateX(100%); transition:transform .25s ease; display:flex; flex-direction:column;
  }
  #drawer.open{transform:translateX(0);}
  #drawer h3{margin:0; padding:16px; font-size:15px; border-bottom:1px solid var(--line);}
  .addbox{padding:14px 16px; border-bottom:1px solid var(--line); display:flex; flex-direction:column; gap:8px;}
  .addbox label{font-size:12px; color:var(--muted);}
  .addbox input{
    background:var(--panel2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:9px 10px; font-size:13px; width:100%;
  }
  .addbox .err{color:var(--red); font-size:12px; min-height:14px;}
  .list{flex:1; overflow:auto; padding:8px 12px;}
  .addr-item{
    display:flex; align-items:center; gap:10px; padding:10px;
    background:var(--panel2); border:1px solid var(--line); border-radius:10px; margin-bottom:8px;
  }
  .addr-item .info{flex:1; min-width:0;}
  .addr-item .nm{font-weight:700; font-size:13px;}
  .addr-item .ad{font-size:11px; color:var(--muted); font-family:monospace;}
  .addr-item .x{cursor:pointer; color:var(--muted); font-size:18px; line-height:1; padding:2px 6px;}
  .addr-item .x:hover{color:var(--red);}
  .switch{position:relative; width:38px; height:22px; flex:0 0 auto;}
  .switch input{display:none;}
  .switch span{position:absolute; inset:0; background:var(--line); border-radius:22px; transition:.2s;}
  .switch span:before{content:""; position:absolute; width:16px; height:16px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s;}
  .switch input:checked + span{background:var(--green);}
  .switch input:checked + span:before{transform:translateX(16px);}
  .empty{color:var(--muted); font-size:13px; text-align:center; padding:24px 8px;}
  .tip{font-size:11px; color:var(--muted); line-height:1.6; padding:0 16px 14px;}
  .tip code{color:var(--accent);}
</style>
</head>
<body>
  <div id="topbar">
    <div class="brand">🐳 Hyperliquid 开单弹幕 <small>顶级交易员实时面板</small></div>
    <div class="seg" id="modeSeg">
      <button data-mode="monitor" class="active">👁 监控模式</button>
      <button data-mode="random">🎲 随机模式</button>
    </div>
    <div class="ctrl" id="threshWrap" style="display:none;">
      金额阈值 $<input type="number" id="thresh" value="1000000" min="10000" step="100000">
    </div>
    <div class="spacer"></div>
    <button class="btn" id="demoBtn">✨ 测试弹幕</button>
    <button class="btn" id="pauseBtn">⏸ 暂停</button>
    <button class="btn primary" id="manageBtn">⚙ 管理地址</button>
    <div id="status"><span class="dot" id="dot"></span><span id="statusText">连接中…</span></div>
  </div>

  <div id="stage">
    <div id="hint">
      <h2>等待交易员开单中…</h2>
      <p id="hintLine">监控模式：在右上角「管理地址」添加要盯的交易员地址</p>
      <p>大额开单会以方形弹幕从左向右滚动飞过，金额越大弹幕越大</p>
      <p style="color:var(--accent)">点「✨ 测试弹幕」可以先预览效果</p>
    </div>
  </div>

  <div id="drawer">
    <h3>⚙ 监控地址管理</h3>
    <div class="addbox">
      <div>
        <label>钱包地址（0x 开头的 42 位地址）</label>
        <input id="inAddr" placeholder="0x1234...abcd" autocomplete="off" spellcheck="false">
      </div>
      <div>
        <label>给它起个名字（方便辨认，可留空）</label>
        <input id="inName" placeholder="例如：聪明钱A / 巨鲸老王" autocomplete="off">
      </div>
      <div class="err" id="addErr"></div>
      <button class="btn primary" id="addBtn">+ 添加监控</button>
    </div>
    <div class="list" id="addrList"></div>
    <div class="tip">
      💡 怎么找地址？在 <code>hyperliquid.xyz</code> 排行榜或区块浏览器里复制交易员的钱包地址即可。<br>
      监控模式会捕捉该地址的 <b>开仓 / 加仓 / 平仓 / 反手 / 调杠杆</b>。
    </div>
  </div>

<script>
/* ===================== 配置与状态 ===================== */
const WS_URL = "wss://api.hyperliquid.xyz/ws";
const INFO_URL = "https://api.hyperliquid.xyz/info";
const LS = {
  addrs:"hl_addrs", mode:"hl_mode", thresh:"hl_thresh"
};

const state = {
  mode: localStorage.getItem(LS.mode) || "monitor",
  thresh: Number(localStorage.getItem(LS.thresh)) || 1000000,
  addrs: load(LS.addrs, []),        // [{addr,name,enabled}]
  paused: false,
  ws: null,
  subs: new Set(),                  // 当前已订阅(字符串化)
  coins: [],                        // 随机模式币种列表
  seenTid: new Set(),               // 随机模式去重
  levCache: {},                     // addr -> {coin -> {lev, szi}}
  pollTimer: null,
};

function load(k, dflt){ try{ return JSON.parse(localStorage.getItem(k)) ?? dflt; }catch(e){ return dflt; } }
function save(k, v){ localStorage.setItem(k, JSON.stringify(v)); }

/* ===================== 工具函数 ===================== */
function shortAddr(a){ return a ? a.slice(0,6)+"…"+a.slice(-4) : ""; }
function nameOf(addr){
  const a = state.addrs.find(x=>x.addr.toLowerCase()===String(addr).toLowerCase());
  return a && a.name ? a.name : shortAddr(addr);
}
function fmtUSD(n){
  n = Math.abs(n);
  if(n>=1e9) return "$"+(n/1e9).toFixed(2)+"B";
  if(n>=1e6) return "$"+(n/1e6).toFixed(2)+"M";
  if(n>=1e3) return "$"+(n/1e3).toFixed(1)+"K";
  return "$"+n.toFixed(0);
}
// 金额 -> 弹幕尺寸(像素)。金额越大越大。
function sizeFor(notional){
  const v = Math.max(notional, 1000);
  const px = 70 + 30*Math.log10(v/1000);   // 1k≈70, 1M≈160, 100M≈220
  return Math.max(76, Math.min(248, px));
}

/* ===================== WebSocket 管理 ===================== */
function setStatus(txt, cls){
  document.getElementById("statusText").textContent = txt;
  const d = document.getElementById("dot");
  d.className = "dot" + (cls?(" "+cls):"");
}
function connect(){
  setStatus("连接中…","");
  const ws = new WebSocket(WS_URL);
  state.ws = ws;
  ws.onopen = ()=>{
    setStatus("已连接","on");
    // 重新订阅
    state.subs.clear();
    resubscribe();
    // 心跳
    clearInterval(ws._ping);
    ws._ping = setInterval(()=>{ try{ ws.send(JSON.stringify({method:"ping"})); }catch(e){} }, 30000);
  };
  ws.onmessage = onMessage;
  ws.onclose = ()=>{
    setStatus("已断开，重连中…","err");
    clearInterval(ws._ping);
    setTimeout(connect, 2000);
  };
  ws.onerror = ()=>{ setStatus("连接错误","err"); try{ws.close();}catch(e){} };
}
function sub(obj){
  const key = JSON.stringify(obj);
  if(state.subs.has(key)) return;
  state.subs.add(key);
  if(state.ws && state.ws.readyState===1)
    state.ws.send(JSON.stringify({method:"subscribe", subscription:obj}));
}
function unsub(obj){
  const key = JSON.stringify(obj);
  if(!state.subs.has(key)) return;
  state.subs.delete(key);
  if(state.ws && state.ws.readyState===1)
    state.ws.send(JSON.stringify({method:"unsubscribe", subscription:obj}));
}
function clearSubs(){
  if(state.ws && state.ws.readyState===1){
    for(const key of state.subs)
      state.ws.send(JSON.stringify({method:"unsubscribe", subscription:JSON.parse(key)}));
  }
  state.subs.clear();
}
function resubscribe(){
  if(state.mode==="monitor"){
    for(const a of state.addrs) if(a.enabled)
      sub({type:"userFills", user:a.addr});
  }else{
    for(const c of state.coins) sub({type:"trades", coin:c});
  }
}

/* ===================== 消息处理 ===================== */
function onMessage(ev){
  let msg; try{ msg = JSON.parse(ev.data); }catch(e){ return; }
  const ch = msg.channel;
  if(ch==="userFills") handleUserFills(msg.data);
  else if(ch==="trades") handleTrades(msg.data);
  // subscriptionResponse / pong 等忽略
}

/* ---- 监控模式：成交 ---- */
function handleUserFills(data){
  if(!data || !data.fills) return;
  if(data.isSnapshot) return;            // 历史快照不弹
  const user = data.user;
  for(const f of data.fills){
    const notional = parseFloat(f.px)*parseFloat(f.sz);
    if(!isFinite(notional) || notional<=0) continue;
    const info = describeFill(f, user);
    spawnDanmu({
      addr: user,
      who: nameOf(user),
      coin: f.coin,
      tag: info.tag,
      cls: info.cls,
      lev: levOf(user, f.coin),
      notional
    });
  }
}
// 解析方向：开多/开空/加仓/平仓/反手 等
function describeFill(f, user){
  const dir = f.dir || "";
  const start = parseFloat(f.startPosition||"0");
  const map = {
    "Open Long":  ()=> start>0 ? {tag:"加多仓", cls:"long"} : {tag:"开多", cls:"long"},
    "Open Short": ()=> start<0 ? {tag:"加空仓", cls:"short"} : {tag:"开空", cls:"short"},
    "Close Long": ()=> ({tag:"平多", cls:"close"}),
    "Close Short":()=> ({tag:"平空", cls:"close"}),
    "Long > Short":()=> ({tag:"多→空 反手", cls:"short"}),
    "Short > Long":()=> ({tag:"空→多 反手", cls:"long"}),
    "Buy":  ()=> ({tag:"买入", cls:"long"}),
    "Sell": ()=> ({tag:"卖出", cls:"short"}),
  };
  if(map[dir]) return map[dir]();
  // 兜底：用 side 判断
  const cls = f.side==="B" ? "long" : "short";
  return {tag: dir || (f.side==="B"?"买入":"卖出"), cls};
}
function levOf(user, coin){
  const c = state.levCache[String(user).toLowerCase()];
  if(c && c[coin] && c[coin].lev) return c[coin].lev + "x";
  return "";
}

/* ---- 监控模式：杠杆轮询 + 调杠杆检测 ---- */
async function pollLeverage(){
  if(state.mode!=="monitor"){ return; }
  for(const a of state.addrs){
    if(!a.enabled) continue;
    try{
      const res = await fetch(INFO_URL,{
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({type:"clearinghouseState", user:a.addr})
      });
      const j = await res.json();
      const key = a.addr.toLowerCase();
      const prev = state.levCache[key] || {};
      const cur = {};
      for(const ap of (j.assetPositions||[])){
        const p = ap.position;
        const lev = p.leverage ? p.leverage.value : null;
        const szi = parseFloat(p.szi||"0");
        cur[p.coin] = {lev, szi};
        // 调杠杆检测：仓位大小几乎不变，但杠杆变了
        if(prev[p.coin] && prev[p.coin].lev && lev && prev[p.coin].lev!==lev){
          const szSame = Math.abs((prev[p.coin].szi||0)-szi) < 1e-9 || (prev[p.coin].szi!==0 && Math.abs(((prev[p.coin].szi-szi)/prev[p.coin].szi))<0.02);
          if(szSame){
            const ntl = Math.abs(parseFloat(p.positionValue||"0")) || Math.abs(szi*(p.entryPx?parseFloat(p.entryPx):0));
            spawnDanmu({
              addr: a.addr,
              who: nameOf(a.addr), coin:p.coin, tag:`调杠杆 ${prev[p.coin].lev}→${lev}`,
              cls:"tweak", lev: lev+"x", notional: ntl||50000
            });
          }
        }
      }
      state.levCache[key] = cur;
    }catch(e){ /* 网络波动忽略 */ }
  }
}

/* ---- 随机模式：大额成交 ---- */
function handleTrades(arr){
  if(!Array.isArray(arr)) return;
  for(const t of arr){
    const notional = parseFloat(t.px)*parseFloat(t.sz);
    if(!(notional>=state.thresh)) continue;
    if(state.seenTid.has(t.tid)) continue;
    state.seenTid.add(t.tid);
    if(state.seenTid.size>5000){ state.seenTid.clear(); }
    const isBuy = t.side==="B";
    const aggressor = isBuy ? (t.users&&t.users[0]) : (t.users&&t.users[1]);
    spawnDanmu({
      addr: aggressor,
      who: nameOf(aggressor),
      coin: t.coin,
      tag: isBuy ? "买入 做多" : "卖出 做空",
      cls: isBuy ? "long" : "short",
      lev: "",
      notional
    });
  }
}

/* ===================== 弹幕动画引擎 ===================== */
const stage = document.getElementById("stage");
const PROFILE_URL = "https://www.d.pro/portfolio/";
const SPEED = 120;                 // 像素/秒，恒定速度
const LANE_H = 86;                 // 轨道高度
let laneFree = [];                 // 每条轨道“入口解除占用”的时间戳
const queue = [];                  // 弹幕等待队列（错开出场，避免粘连）

function laneN(){ return Math.max(3, Math.floor((stage.clientHeight-16)/LANE_H)); }

// 把事件放进队列，由分发器错开释放
function spawnDanmu(item){
  if(state.paused) return;
  queue.push(item);
  if(queue.length>80) queue.splice(0, queue.length-80); // 积压过多丢弃最旧
}

// 分发循环：每次只放一条，按积压量动态调整间隔 → 水平错开，永不成墙
function dispenseLoop(){
  let delay = 300;
  if(!state.paused && queue.length){
    const placed = renderDanmu(queue[0]);
    if(placed){
      queue.shift();
      delay = queue.length>40 ? 160 : queue.length>12 ? 220 : 320;
    }else{
      delay = 110;   // 当前没有空闲轨道，稍后重试，保留该条
    }
  }
  setTimeout(dispenseLoop, delay);
}

// 找一段连续、当前空闲、足够高的轨道；返回起始轨道，找不到返回 -1
function findLanes(span, n, now){
  let bestStart=-1, bestMax=Infinity;
  for(let s=0; s+span<=n; s++){
    let mx=0;
    for(let j=s;j<s+span;j++) mx=Math.max(mx, laneFree[j]||0);
    if(mx<bestMax){ bestMax=mx; bestStart=s; }
  }
  return bestMax<=now ? bestStart : -1;   // 全部被占用则 -1
}

function renderDanmu(item){
  const {who,coin,tag,cls,lev,notional,addr} = item;
  document.getElementById("hint").style.display="none";

  const size = sizeFor(notional);
  const mega = notional >= 1e6;            // 100万美金以上：巨单特效
  const el = document.createElement("div");
  el.className = "danmu "+cls+(mega?" mega":"");
  el.style.minWidth = size+"px";
  el.style.maxWidth = (size*1.6)+"px";
  el.style.fontSize = Math.max(12, size*0.135)+"px";
  el.style.visibility = "hidden";   // 先隐藏，量好尺寸再决定是否放置
  el.innerHTML = `
    <div class="row1">
      <span class="tag">${tag}</span>
      <span class="coin">${coin}</span>
      ${lev?`<span class="lev">${lev}</span>`:""}
    </div>
    <div class="who">👤 ${who}</div>
    <div class="amt">${fmtUSD(notional)}${mega?'<span class="mega-badge">💥 巨单</span>':''}</div>`;
  stage.appendChild(el);

  const cardH = el.offsetHeight || size;
  const cardW = el.offsetWidth;
  const n = laneN();
  for(let i=laneFree.length;i<n;i++) laneFree[i]=0;
  const now = performance.now();
  const span = Math.max(1, Math.ceil((cardH+8)/LANE_H));   // 高卡占多条轨道
  const start = findLanes(span, n, now);
  if(start<0){ el.remove(); return false; }                // 没有空位，等下一轮

  let top = 8 + start*LANE_H + (span*LANE_H - cardH)/2;
  top = Math.max(6, Math.min(top, stage.clientHeight - cardH - 6));
  el.style.top = top+"px";
  el.style.visibility = "visible";

  // 占用这些轨道，直到卡片完全驶离左侧入口（含一个间隔）
  const reserveUntil = now + (cardW+70)/SPEED*1000;
  for(let j=start;j<start+span;j++) laneFree[j]=reserveUntil;

  const dur = (stage.clientWidth + cardW + 60)/SPEED*1000;
  const anim = el.animate(
    [{transform:`translateX(${-cardW-20}px)`},{transform:`translateX(${stage.clientWidth+20}px)`}],
    {duration:dur, easing:"linear"}
  );
  anim.onfinish = ()=> el.remove();

  // 悬停暂停移动；移开继续
  el.addEventListener("mouseenter", ()=>{ try{anim.pause();}catch(e){} });
  el.addEventListener("mouseleave", ()=>{ try{anim.play();}catch(e){} });
  // 点击跳转到该地址的 Hyperliquid 个人页
  if(addr){
    el.style.cursor = "pointer";
    el.title = "点击查看 "+addr+" 的 d.pro 资产组合";
    el.addEventListener("click", ()=> window.open(PROFILE_URL+addr, "_blank", "noopener"));
  }
  return true;
}

/* ===================== 地址管理 UI ===================== */
const isAddr = s => /^0x[0-9a-fA-F]{40}$/.test(s.trim());
function renderAddrList(){
  const box = document.getElementById("addrList");
  if(state.addrs.length===0){ box.innerHTML = `<div class="empty">还没有监控地址<br>在上面添加一个吧</div>`; return; }
  box.innerHTML = "";
  state.addrs.forEach((a,i)=>{
    const item = document.createElement("div");
    item.className = "addr-item";
    item.innerHTML = `
      <label class="switch"><input type="checkbox" ${a.enabled?"checked":""} data-i="${i}"><span></span></label>
      <div class="info">
        <div class="nm">${a.name || "未命名"}</div>
        <div class="ad">${a.addr}</div>
      </div>
      <div class="x" data-del="${i}" title="删除">✕</div>`;
    box.appendChild(item);
  });
  box.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.onchange = ()=>{ const i=+cb.dataset.i; state.addrs[i].enabled=cb.checked; save(LS.addrs,state.addrs); applyMode(); };
  });
  box.querySelectorAll('[data-del]').forEach(x=>{
    x.onclick = ()=>{ state.addrs.splice(+x.dataset.del,1); save(LS.addrs,state.addrs); renderAddrList(); applyMode(); };
  });
}
function addAddress(){
  const ai = document.getElementById("inAddr"), ni = document.getElementById("inName");
  const err = document.getElementById("addErr");
  const addr = ai.value.trim(), name = ni.value.trim();
  if(!isAddr(addr)){ err.textContent="地址格式不对，应为 0x 开头的 42 位字符"; return; }
  if(state.addrs.some(a=>a.addr.toLowerCase()===addr.toLowerCase())){ err.textContent="这个地址已经在监控列表里了"; return; }
  err.textContent="";
  state.addrs.push({addr, name, enabled:true});
  save(LS.addrs, state.addrs);
  ai.value=""; ni.value="";
  renderAddrList(); applyMode();
}

/* ===================== 模式切换 ===================== */
async function loadCoins(){
  if(state.coins.length) return;
  try{
    const res = await fetch(INFO_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:"meta"})});
    const j = await res.json();
    state.coins = (j.universe||[]).filter(u=>!u.isDelisted).map(u=>u.name);
  }catch(e){ state.coins = ["BTC","ETH","SOL","HYPE"]; } // 兜底
}
async function applyMode(){
  clearSubs();
  // 暂停轮询
  clearInterval(state.pollTimer); state.pollTimer=null;

  const hintLine = document.getElementById("hintLine");
  document.getElementById("threshWrap").style.display = state.mode==="random" ? "flex" : "none";

  if(state.mode==="monitor"){
    hintLine.textContent = "监控模式：在右上角「管理地址」添加要盯的交易员地址";
    resubscribe();
    pollLeverage();
    state.pollTimer = setInterval(pollLeverage, 8000);
  }else{
    hintLine.textContent = `随机模式：全网名义金额大于 ${fmtUSD(state.thresh)} 的成交都会弹出`;
    await loadCoins();
    resubscribe();
  }
}

/* ===================== 事件绑定 ===================== */
document.getElementById("modeSeg").addEventListener("click", e=>{
  const b = e.target.closest("button"); if(!b) return;
  state.mode = b.dataset.mode; save(LS.mode, state.mode);
  document.querySelectorAll("#modeSeg button").forEach(x=>x.classList.toggle("active", x===b));
  applyMode();
});
document.getElementById("thresh").addEventListener("change", e=>{
  state.thresh = Math.max(10000, Number(e.target.value)||1000000);
  save(LS.thresh, state.thresh);
  if(state.mode==="random") document.getElementById("hintLine").textContent =
    `随机模式：全网名义金额大于 ${fmtUSD(state.thresh)} 的成交都会弹出`;
});
document.getElementById("manageBtn").onclick = ()=> document.getElementById("drawer").classList.toggle("open");
document.getElementById("addBtn").onclick = addAddress;
document.getElementById("inAddr").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("inName").focus(); });
document.getElementById("inName").addEventListener("keydown",e=>{ if(e.key==="Enter") addAddress(); });
document.getElementById("pauseBtn").onclick = (e)=>{
  state.paused = !state.paused;
  e.target.textContent = state.paused ? "▶ 继续" : "⏸ 暂停";
};
document.getElementById("demoBtn").onclick = ()=> demo();

/* ---- 测试弹幕：随机生成几条预览 ---- */
function demo(){
  const coins=["BTC","ETH","SOL","HYPE","DOGE","PEPE","XRP"];
  const samples=[
    {tag:"开多",cls:"long"},{tag:"开空",cls:"short"},{tag:"加多仓",cls:"long"},
    {tag:"平多",cls:"close"},{tag:"空→多 反手",cls:"long"},{tag:"调杠杆 5→20",cls:"tweak"},
    {tag:"买入 做多",cls:"long"},{tag:"卖出 做空",cls:"short"}
  ];
  const names=["聪明钱A","巨鲸老王","0x金狗","量化机器人","神秘大户"];
  let i=0;
  const t=setInterval(()=>{
    const s=samples[Math.floor(Math.random()*samples.length)];
    spawnDanmu({
      who:names[Math.floor(Math.random()*names.length)],
      coin:coins[Math.floor(Math.random()*coins.length)],
      tag:s.tag, cls:s.cls,
      lev:(s.cls==="tweak"?"20x":(Math.random()<.6?[3,5,10,20,50][Math.floor(Math.random()*5)]+"x":"")),
      notional: Math.pow(10, 4+Math.random()*4) // 1万~1亿
    });
    if(++i>=8) clearInterval(t);
  }, 350);
}

/* ===================== 启动 ===================== */
(function init(){
  // 还原模式按钮
  document.querySelectorAll("#modeSeg button").forEach(b=>b.classList.toggle("active", b.dataset.mode===state.mode));
  document.getElementById("thresh").value = state.thresh;
  renderAddrList();
  connect();
  applyMode();
  dispenseLoop();
  window.addEventListener("resize", ()=>{ laneFree.length=0; });
})();
</script>
